openapi: 3.1.0
info:
  title: Omni-BugTracker API
  version: 1.0.0
  description: >
    Developer-first, self-hosted issue & bug tracker. Design-first contract:
    Go handlers and the TypeScript client are generated from this file.
    Every UI action is expressible here.
servers:
  - url: /api/v1
security:
  - bearerAuth: []          # Omni-Identity JWT
  - apiToken: []            # hashed API token

tags:
  - name: issues
  - name: projects
  - name: comments
  - name: search
  - name: automation
  - name: webhooks
  - name: integrations
  - name: dashboards
  - name: system

paths:
  /healthz:
    get:
      tags: [system]
      operationId: health
      security: []
      responses: { "200": { description: OK } }

  /me:
    get:
      tags: [system]
      operationId: getMe
      responses:
        "200": { description: current user, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  /me/tokens:
    get:
      tags: [system]
      operationId: listApiTokens
      responses:
        "200": { description: token list (metadata only), content: { application/json: { schema: { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/ApiToken" } } } } } } }
    post:
      tags: [system]
      operationId: createApiToken
      description: "Creates a personal API token. The plaintext secret is returned exactly once."
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string }, scopes: { type: array, items: { type: string } } } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/CreatedApiToken" } } } }
  /me/tokens/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    delete:
      tags: [system]
      operationId: revokeApiToken
      responses:
        "204": { description: revoked }
        "404": { $ref: "#/components/responses/Problem" }

  /users/{id}/role:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    patch:
      tags: [system]
      operationId: updateUserRole
      description: "Change a user's role (owner/admin only; cannot change your own)."
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [role], properties: { role: { type: string, enum: [owner, admin, maintainer, member, reporter, bot] } } } } }
      responses:
        "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "403": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }

  /projects:
    get:
      tags: [projects]
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: project list, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectList" } } } }
    post:
      tags: [projects]
      operationId: createProject
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateProject" } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "409": { $ref: "#/components/responses/Problem" }

  /projects/{key}:
    parameters: [{ $ref: "#/components/parameters/ProjectKey" }]
    get:
      tags: [projects]
      operationId: getProject
      responses:
        "200": { description: project, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "404": { $ref: "#/components/responses/Problem" }
    patch:
      tags: [projects]
      operationId: updateProject
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateProject" } } }
      responses:
        "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "404": { $ref: "#/components/responses/Problem" }
    delete:
      tags: [projects]
      operationId: archiveProject
      description: "Soft-delete: archives the project (excluded from list; unarchive via PATCH is_archived=false)."
      responses:
        "204": { description: archived }
        "404": { $ref: "#/components/responses/Problem" }

  /projects/{key}/issues:
    parameters: [{ $ref: "#/components/parameters/ProjectKey" }]
    get:
      tags: [issues]
      operationId: listIssues
      parameters:
        - name: filter
          in: query
          description: "GitHub-style filter, e.g. `is:open assignee:@me severity:critical component:auth`"
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, default: "-created_at" }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: issue list, content: { application/json: { schema: { $ref: "#/components/schemas/IssueList" } } } }
    post:
      tags: [issues]
      operationId: createIssue
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateIssue" } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
        "422": { $ref: "#/components/responses/Problem" }

  /projects/{key}/components:
    parameters: [{ $ref: "#/components/parameters/ProjectKey" }]
    get:
      tags: [projects]
      operationId: listComponents
      responses:
        "200":
          description: components with open-issue counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Component" } }
    post:
      tags: [projects]
      operationId: createComponent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description_md: { type: string }
                lead_id: { type: string, format: uuid, nullable: true }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Component" } } } }
        "409": { $ref: "#/components/responses/Problem" }

  /components/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [projects]
      operationId: updateComponent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description_md: { type: string }
                lead_id: { type: string, format: uuid, nullable: true, description: "Zero UUID clears the lead." }
      responses:
        "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/Component" } } } }
    delete:
      tags: [projects]
      operationId: deleteComponent
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/Problem" }

  /projects/{key}/milestones:
    parameters: [{ $ref: "#/components/parameters/ProjectKey" }]
    get:
      tags: [projects]
      operationId: listMilestones
      responses:
        "200":
          description: milestones with open/closed issue counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Milestone" } }
    post:
      tags: [projects]
      operationId: createMilestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description_md: { type: string }
                due_on: { type: string, format: date, description: "YYYY-MM-DD" }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Milestone" } } } }
        "409": { $ref: "#/components/responses/Problem" }

  /milestones/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [projects]
      operationId: updateMilestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description_md: { type: string }
                due_on: { type: string, format: date, nullable: true, description: "empty string clears" }
                state: { type: string, enum: [open, closed] }
      responses:
        "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/Milestone" } } } }
    delete:
      tags: [projects]
      operationId: deleteMilestone
      description: Issues keep existing; their milestone_id becomes null.
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/Problem" }

  /projects/{key}/releases:
    parameters: [{ $ref: "#/components/parameters/ProjectKey" }]
    get:
      tags: [projects]
      operationId: listReleases
      responses:
        "200":
          description: releases with open/done issue counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Release" } }
    post:
      tags: [projects]
      operationId: createRelease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: string }
                name: { type: string }
                notes_md: { type: string }
                git_tag: { type: string }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Release" } } } }
        "409": { $ref: "#/components/responses/Problem" }

  /releases/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [projects]
      operationId: updateRelease
      description: Setting state=published stamps released_at on first publish.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: string }
                name: { type: string }
                notes_md: { type: string }
                git_tag: { type: string }
                state: { type: string, enum: [draft, published] }
      responses:
        "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/Release" } } } }
    delete:
      tags: [projects]
      operationId: deleteRelease
      description: Issues keep existing; their release_id becomes null.
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/Problem" }

  /projects/{key}/members:
    parameters: [{ $ref: "#/components/parameters/ProjectKey" }]
    get:
      tags: [projects]
      operationId: listProjectMembers
      responses:
        "200":
          description: project members
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/ProjectMember" } }

  /projects/{key}/members/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectKey"
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      tags: [projects]
      operationId: putProjectMember
      description: >
        Add or update a member. Membership elevates the user's capabilities inside this
        project (effective permission = global role OR project role).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [owner, admin, maintainer, member, reporter, bot] }
      responses:
        "200": { description: member upserted, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectMember" } } } }
    delete:
      tags: [projects]
      operationId: deleteProjectMember
      responses:
        "204": { description: removed }
        "404": { $ref: "#/components/responses/Problem" }

  /issues/{issueKey}:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    get:
      tags: [issues]
      operationId: getIssue
      responses:
        "200": { description: issue, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
        "404": { $ref: "#/components/responses/Problem" }
    patch:
      tags: [issues]
      operationId: updateIssue
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateIssue" } } }
      responses:
        "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
    delete:
      tags: [issues]
      operationId: deleteIssue
      responses: { "204": { description: deleted } }

  /issues/{issueKey}/transition:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    post:
      tags: [issues]
      operationId: transitionIssue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { $ref: "#/components/schemas/IssueStatus" }
                comment: { type: string }
      responses:
        "200": { description: transitioned, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
        "409": { $ref: "#/components/responses/Problem" }

  /issues/{issueKey}/move:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    post:
      tags: [issues]
      operationId: moveIssue
      description: >
        Re-home an issue into another project. The issue is reallocated a number in the
        target project, so its key changes; project-scoped associations (milestone,
        release, components) are cleared and labels are re-mapped by name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_project_key]
              properties:
                target_project_key: { type: string }
      responses:
        "200": { description: moved, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
        "404": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }

  /issues/{issueKey}/activity:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    get:
      tags: [issues]
      operationId: listIssueActivity
      responses:
        "200": { description: timeline, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Activity" } } } } }

  /issues/{issueKey}/commits:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    get:
      tags: [issues]
      operationId: listIssueCommits
      description: Git commits linked to this issue via commit/PR references.
      responses:
        "200": { description: linked commits, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/LinkedCommit" } } } } }

  /issues/{issueKey}/comments:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    get:
      tags: [comments]
      operationId: listComments
      responses:
        "200": { description: comments, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Comment" } } } } }
    post:
      tags: [comments]
      operationId: createComment
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [body_md], properties: { body_md: { type: string } } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Comment" } } } }

  /issues/{issueKey}/relations:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    get:
      tags: [issues]
      operationId: listIssueRelations
      description: Both directions; direction "in" means this issue is the to-side (render the inverse label).
      responses:
        "200":
          description: relations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/IssueRelation" } }
    post:
      tags: [issues]
      operationId: addIssueRelation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, issue_key]
              properties:
                kind: { $ref: "#/components/schemas/RelationKind" }
                issue_key: { type: string, description: "the other issue, e.g. BUG-421" }
      responses:
        "201": { description: linked, content: { application/json: { schema: { $ref: "#/components/schemas/IssueRelation" } } } }
        "409": { $ref: "#/components/responses/Problem" }

  /relations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [issues]
      operationId: deleteIssueRelation
      responses:
        "204": { description: unlinked }
        "404": { $ref: "#/components/responses/Problem" }

  /comments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [comments]
      operationId: updateComment
      description: Author-only; stamps edited_at.
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [body_md], properties: { body_md: { type: string } } } } }
      responses:
        "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/Comment" } } } }
    delete:
      tags: [comments]
      operationId: deleteComment
      description: Soft delete; allowed for the author or anyone with project:manage.
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/Problem" }

  /issues/{issueKey}/attachments:
    parameters: [{ $ref: "#/components/parameters/IssueKey" }]
    get:
      tags: [issues]
      operationId: listAttachments
      responses:
        "200":
          description: attachments on the issue
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Attachment" } }
    post:
      tags: [issues]
      operationId: uploadAttachment
      description: >
        Direct multipart upload; bytes are stored on the server's attachment volume.
        Size limit is configured via storage.max_upload_mb (default 25 MB).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201": { description: uploaded, content: { application/json: { schema: { $ref: "#/components/schemas/Attachment" } } } }
        "413": { $ref: "#/components/responses/Problem" }

  /attachments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [issues]
      operationId: downloadAttachment
      description: Streams the bytes. Images/PDF render inline; other types download.
      responses:
        "200":
          description: attachment bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
    delete:
      tags: [issues]
      operationId: deleteAttachment
      description: Allowed for the uploader or anyone with project:manage on the issue's project.
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/Problem" }

  /issues/bulk:
    post:
      tags: [issues]
      operationId: bulkUpdateIssues
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdate" } } }
      responses:
        "200": { description: result, content: { application/json: { schema: { type: object, properties: { updated: { type: integer } } } } } }

  /search:
    get:
      tags: [search]
      operationId: search
      description: Global full-text search across issues and comments (Postgres FTS, websearch syntax).
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: results, content: { application/json: { schema: { $ref: "#/components/schemas/SearchResults" } } } }

  /automation/rules:
    get:
      tags: [automation]
      operationId: listAutomationRules
      responses:
        "200": { description: rules, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/AutomationRule" } } } } }
    post:
      tags: [automation]
      operationId: createAutomationRule
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AutomationRule" } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/AutomationRule" } } } }

  /webhooks:
    get:
      tags: [webhooks]
      operationId: listWebhooks
      responses:
        "200": { description: webhooks, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Webhook" } } } } }
    post:
      tags: [webhooks]
      operationId: createWebhook
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Webhook" } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Webhook" } } } }

  /integrations/git/events:
    post:
      tags: [integrations]
      operationId: ingestGitEvent
      security: []
      description: Inbound commit/PR payloads (HMAC-signed). Parses issue references.
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses: { "202": { description: accepted } }

  /integrations/logging/alerts:
    post:
      tags: [integrations]
      operationId: ingestLoggingAlert
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ObservabilityAlert" } } }
      responses: { "202": { description: accepted } }

  /integrations/metrics/alerts:
    post:
      tags: [integrations]
      operationId: ingestMetricsAlert
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ObservabilityAlert" } } }
      responses: { "202": { description: accepted } }

  /dashboards/overview:
    get:
      tags: [dashboards]
      operationId: dashboardOverview
      parameters:
        - name: project
          in: query
          schema: { type: string }
        - name: range
          in: query
          schema: { type: string, default: "30d" }
      responses:
        "200": { description: metrics, content: { application/json: { schema: { $ref: "#/components/schemas/DashboardOverview" } } } }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    apiToken: { type: http, scheme: bearer }

  parameters:
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 50, maximum: 200 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    ProjectKey:
      name: key
      in: path
      required: true
      schema: { type: string, pattern: "^[A-Z][A-Z0-9]{1,9}$" }
    IssueKey:
      name: issueKey
      in: path
      required: true
      description: "e.g. BUG-421"
      schema: { type: string, pattern: "^[A-Z][A-Z0-9]{1,9}-[0-9]+$" }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string }

  responses:
    Problem:
      description: RFC 9457 problem+json
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        errors: { type: object, additionalProperties: { type: string } }

    IssueType:   { type: string, enum: [bug, task, feature, improvement] }
    IssueStatus: { type: string, enum: [open, in_progress, blocked, ready_for_review, resolved, closed, reopened] }
    Severity:    { type: string, enum: [critical, high, medium, low] }
    Priority:    { type: string, enum: [p0, p1, p2, p3] }
    RelationKind: { type: string, enum: [blocks, blocked_by, duplicates, relates, caused_by] }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }
        role: { type: string }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }
        description_md: { type: string }
        default_assignee_id: { type: string, format: uuid, nullable: true }
        is_archived: { type: boolean }
        created_at: { type: string, format: date-time }
        my_role:
          type: string
          description: "caller's effective role for this project (global, elevated by membership)"
    ProjectList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Project" } }
        next_cursor: { type: string, nullable: true }
    CreateProject:
      type: object
      required: [key, name]
      properties:
        key: { type: string, pattern: "^[A-Z][A-Z0-9]{1,9}$" }
        name: { type: string }
        description_md: { type: string }

    UpdateProject:
      type: object
      description: Partial edit; omitted fields are left unchanged.
      properties:
        name: { type: string }
        description_md: { type: string }
        is_archived: { type: boolean }
        default_assignee_id:
          type: string
          format: uuid
          nullable: true
          description: "Zero UUID clears the default assignee."

    ApiToken:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        scopes: { type: array, items: { type: string } }
        last_used_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    CreatedApiToken:
      type: object
      description: "Returned once on creation; `token` is the plaintext secret and is never shown again."
      properties:
        token: { type: string, description: "plaintext secret (obt_…)" }
        id: { type: string, format: uuid }
        name: { type: string }
        scopes: { type: array, items: { type: string } }
        created_at: { type: string, format: date-time }

    Issue:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string, description: "e.g. BUG-421" }
        project_key: { type: string }
        number: { type: integer }
        type: { $ref: "#/components/schemas/IssueType" }
        title: { type: string }
        description_md: { type: string }
        status: { $ref: "#/components/schemas/IssueStatus" }
        severity: { $ref: "#/components/schemas/Severity" }
        priority: { $ref: "#/components/schemas/Priority" }
        reporter: { $ref: "#/components/schemas/User" }
        assignee: { $ref: "#/components/schemas/User" }
        labels: { type: array, items: { type: string } }
        components: { type: array, items: { type: string } }
        milestone_id: { type: string, format: uuid, nullable: true }
        milestone: { type: string, description: "milestone title" }
        release_id: { type: string, format: uuid, nullable: true }
        release: { type: string, description: "release version" }
        version_affected: { type: string }
        version_fixed: { type: string }
        git_commit_sha: { type: string }
        pull_request_url: { type: string }
        repro_steps_md: { type: string }
        expected_md: { type: string }
        actual_md: { type: string }
        environment_md: { type: string }
        source: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    IssueList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Issue" } }
        next_cursor: { type: string, nullable: true }
        total: { type: integer }
    CreateIssue:
      type: object
      required: [title]
      properties:
        type: { $ref: "#/components/schemas/IssueType" }
        title: { type: string }
        description_md: { type: string }
        severity: { $ref: "#/components/schemas/Severity" }
        priority: { $ref: "#/components/schemas/Priority" }
        assignee_id: { type: string, format: uuid, nullable: true }
        labels: { type: array, items: { type: string } }
        components: { type: array, items: { type: string } }
        version_affected: { type: string }
        repro_steps_md: { type: string }
        expected_md: { type: string }
        actual_md: { type: string }
        environment_md: { type: string }
    IssueRelation:
      type: object
      properties:
        id: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/RelationKind" }
        direction: { type: string, enum: [out, in] }
        issue_key: { type: string }
        title: { type: string }
        status: { $ref: "#/components/schemas/IssueStatus" }

    ProjectMember:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        role: { type: string }
        created_at: { type: string, format: date-time }

    Milestone:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description_md: { type: string }
        due_on: { type: string, format: date, nullable: true }
        state: { type: string, enum: [open, closed] }
        open_issues: { type: integer }
        closed_issues: { type: integer }
        created_at: { type: string, format: date-time }

    Component:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description_md: { type: string }
        lead_id: { type: string, format: uuid, nullable: true }
        open_issues: { type: integer }
        created_at: { type: string, format: date-time }

    Release:
      type: object
      properties:
        id: { type: string, format: uuid }
        version: { type: string }
        name: { type: string }
        notes_md: { type: string }
        state: { type: string, enum: [draft, published] }
        git_tag: { type: string }
        released_at: { type: string, format: date-time, nullable: true }
        open_issues: { type: integer }
        done_issues: { type: integer }
        created_at: { type: string, format: date-time }

    UpdateIssue:
      type: object
      properties:
        title: { type: string }
        description_md: { type: string }
        severity: { $ref: "#/components/schemas/Severity" }
        priority: { $ref: "#/components/schemas/Priority" }
        assignee_id: { type: string, format: uuid, nullable: true }
        milestone_id: { type: string, format: uuid, nullable: true }
        version_fixed: { type: string }
        labels: { type: array, items: { type: string } }
        components:
          type: array
          items: { type: string }
          description: "Replaces the set; names must exist as project components."
    BulkUpdate:
      type: object
      properties:
        ids: { type: array, items: { type: string, format: uuid } }
        filter: { type: string }
        patch: { $ref: "#/components/schemas/UpdateIssue" }

    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/User" }
        body_md: { type: string }
        edited_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Activity:
      type: object
      properties:
        id: { type: string, format: uuid }
        actor: { $ref: "#/components/schemas/User" }
        verb: { type: string }
        entity_type: { type: string }
        changes: { type: object, additionalProperties: true }
        occurred_at: { type: string, format: date-time }

    LinkedCommit:
      type: object
      properties:
        sha: { type: string }
        repo: { type: string }
        author: { type: string }
        message: { type: string }
        url: { type: string }
        verb: { type: string, description: "fixes|closes|resolves|refs|related" }
        created_at: { type: string, format: date-time }

    Attachment:
      type: object
      properties:
        id: { type: string, format: uuid }
        issue_id: { type: string, format: uuid }
        uploader: { $ref: "#/components/schemas/User" }
        filename: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    SearchHit:
      type: object
      properties:
        issue_key: { type: string }
        project_key: { type: string }
        title: { type: string }
        status: { type: string }
        type: { type: string }
        snippet: { type: string, description: "plain text with «…» match marks (not HTML)" }
        rank: { type: number }
        matched_in: { type: string, enum: [issue, comment] }
    SearchResults:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        source: { type: string, enum: [omni-search, postgres-fts] }
        total: { type: integer }

    AutomationRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_key: { type: string, nullable: true }
        name: { type: string }
        is_active: { type: boolean }
        priority: { type: integer }
        trigger: { type: object, additionalProperties: true }
        actions: { type: array, items: { type: object, additionalProperties: true } }

    Webhook:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_key: { type: string, nullable: true }
        url: { type: string }
        events: { type: array, items: { type: string } }
        is_active: { type: boolean }

    ObservabilityAlert:
      type: object
      required: [source, rule, title]
      properties:
        source: { type: string, enum: [logging, metrics] }
        rule: { type: string }
        project_key: { type: string }
        title: { type: string }
        fingerprint: { type: string, description: "Dedupe key; repeated alerts collapse into one issue." }
        severity: { $ref: "#/components/schemas/Severity" }
        details_md: { type: string }
        stack_trace: { type: string }
        occurrences: { type: integer }

    DashboardOverview:
      type: object
      properties:
        open_issues: { type: integer }
        critical_issues: { type: integer }
        avg_resolution_hours: { type: number }
        mttr_hours: { type: number }
        regression_rate: { type: number }
        issues_by_component: { type: object, additionalProperties: { type: integer } }
        issues_by_release: { type: object, additionalProperties: { type: integer } }
        team_workload: { type: object, additionalProperties: { type: integer } }
        recent_activity: { type: array, items: { $ref: "#/components/schemas/Activity" } }
