# Default configuration. Overridden by environment (OMNI_BT_<SECTION>__<KEY>).
# Behavioral config (automation rules, webhooks, integration credentials) lives in
# the database and is editable at runtime via the API — only bootstrap config is here.

server:
  addr: ":8080"
  base_url: "http://localhost:8080"
  read_timeout: "15s"
  write_timeout: "30s"
  cors_origins:
    - "http://localhost:5173"

database:
  dsn: "postgres://omni:omni@localhost:5432/omni_bugtracker?sslmode=disable"
  max_conns: 20
  min_conns: 2

redis:
  addr: "localhost:6379"
  db: 0

worker:
  queues:
    default: 10
    webhooks: 5
    integrations: 5
  poll_interval: "1s"

identity:
  # Omni-Identity (OIDC). Access tokens carry aud = client_id, so audience == client_id.
  issuer: "http://192.168.68.34:8081"
  jwks_url: "http://192.168.68.34:8081/jwks.json"
  audience: "omni-bugtracker"
  jwks_cache_ttl: "1h"
  # Browser login (Authorization Code + PKCE, exchanged server-side by the API).
  client_id: "omni-bugtracker"
  authorize_url: "http://192.168.68.34:8081/oauth2/authorize"
  token_url: "http://192.168.68.34:8081/oauth2/token"
  userinfo_url: "http://192.168.68.34:8081/userinfo"
  end_session_url: "http://192.168.68.34:8081/logout"
  redirect_uri: "http://192.168.68.34:3002/auth/callback"
  scopes: "openid email profile offline_access"
  post_logout_url: "http://192.168.68.34:3002/"

integrations:
  notify:
    enabled: true
    base_url: "http://omni-notify:8080"
    timeout: "5s"
  search:
    enabled: true
    base_url: "http://omni-search:8080"
    timeout: "5s"
  upload:
    enabled: true
    base_url: "http://omni-upload:8080"
    timeout: "10s"
  logging:
    enabled: true
    webhook_secret: ""
  metrics:
    enabled: true
    webhook_secret: ""
  git:
    enabled: true
    webhook_secret: ""
    # Verbs that transition an issue vs. only link it.
    close_verbs: ["fixes", "fix", "closes", "close", "resolves", "resolve"]
    link_verbs: ["refs", "ref", "see", "related"]
    close_on_merge: true

archive:
  # Fallback default for auto-archive (issues closed more than N days ago are archived
  # by a daily job). 0 disables it. This is only the initial default — admins override
  # it live from Settings → Auto-archive (stored in the DB). Manual archive is always on.
  auto_after_days: 0

log:
  level: "info"
  format: "json"

observability:
  metrics_enabled: true
  tracing_enabled: false
  otlp_endpoint: ""
