# Default configuration. Overridden by environment (OMNI_BT_<SECTION>__<KEY>).
# Behavioral config (automation rules, webhooks, integration credentials) lives in
# the database and is editable at runtime via the API — only bootstrap config is here.

server:
  addr: ":8080"
  base_url: "http://localhost:8080"
  read_timeout: "15s"
  write_timeout: "30s"
  cors_origins:
    - "http://localhost:5173"

database:
  dsn: "postgres://omni:omni@localhost:5432/omni_bugtracker?sslmode=disable"
  max_conns: 20
  min_conns: 2

redis:
  addr: "localhost:6379"
  db: 0

worker:
  queues:
    default: 10
    webhooks: 5
    integrations: 5
  poll_interval: "1s"

identity:
  issuer: "https://id.omni.dev"
  jwks_url: "https://id.omni.dev/.well-known/jwks.json"
  audience: "omni-bugtracker"
  jwks_cache_ttl: "1h"

integrations:
  notify:
    enabled: true
    base_url: "http://omni-notify:8080"
    timeout: "5s"
  search:
    enabled: true
    base_url: "http://omni-search:8080"
    timeout: "5s"
  upload:
    enabled: true
    base_url: "http://omni-upload:8080"
    timeout: "10s"
  logging:
    enabled: true
    webhook_secret: ""
  metrics:
    enabled: true
    webhook_secret: ""
  git:
    enabled: true
    webhook_secret: ""
    # Verbs that transition an issue vs. only link it.
    close_verbs: ["fixes", "fix", "closes", "close", "resolves", "resolve"]
    link_verbs: ["refs", "ref", "see", "related"]
    close_on_merge: true

log:
  level: "info"
  format: "json"

observability:
  metrics_enabled: true
  tracing_enabled: false
  otlp_endpoint: ""
